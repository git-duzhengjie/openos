name: OpenOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-i386:
    name: Build i386 boot image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib nasm binutils xorriso mtools qemu-system-x86

      - name: Check patch whitespace
        run: git diff --check

      - name: Build default image
        run: bash build.sh

      - name: Verify build artifacts
        run: |
          test -f target/openos.img
          test -f target/kernel.bin
          test -s target/openos.img
          test -s target/kernel.bin

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openos-i386-image
          path: |
            target/openos.img
            target/kernel.elf
            target/kernel.bin

  unit-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Check version metadata
        run: |
          bash scripts/version.sh --full
          bash scripts/gen-version-header.sh
          test -s src/kernel/include/version.h

      - name: Run unit tests
        run: bash tests/run_unit_tests.sh

  bootloader-check:
    name: Validate boot sector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NASM
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Assemble and verify boot sector
        run: |
          nasm -f bin src/boot/boot.asm -o /tmp/openos-boot.bin
          test "$(stat -c%s /tmp/openos-boot.bin)" = "512"
          test "$(tail -c 2 /tmp/openos-boot.bin | od -An -tx1 | tr -d ' \n')" = "55aa"

  arch-syntax-check:
    name: Architecture skeleton syntax checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Compile ARM skeleton C files
        run: |
          gcc -ffreestanding -nostdlib -Wall -Wextra -Werror -O2 -Isrc/arch/arm/include -c src/arch/arm/kernel/kernel_arm.c -o /tmp/kernel_arm.o
          gcc -ffreestanding -nostdlib -Wall -Wextra -Werror -O2 -Isrc/arch/arm/include -c src/arch/arm/kernel/platform_arm.c -o /tmp/platform_arm.o
          gcc -ffreestanding -nostdlib -Wall -Wextra -Werror -O2 -Isrc/arch/arm/include -c src/arch/arm/kernel/early_console_arm.c -o /tmp/early_console_arm.o

      - name: Compile RISC-V skeleton C files
        run: |
          gcc -ffreestanding -nostdlib -Wall -Wextra -Werror -O2 -Isrc/arch/riscv/include -c src/arch/riscv/kernel/kernel_riscv.c -o /tmp/kernel_riscv.o
          gcc -ffreestanding -nostdlib -Wall -Wextra -Werror -O2 -Isrc/arch/riscv/include -c src/arch/riscv/kernel/platform_riscv.c -o /tmp/platform_riscv.o
          gcc -ffreestanding -nostdlib -Wall -Wextra -Werror -O2 -Isrc/arch/riscv/include -c src/arch/riscv/kernel/early_console_riscv.c -o /tmp/early_console_riscv.o

  qemu-smoke-test:
    name: QEMU smoke regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib nasm binutils xorriso mtools qemu-system-x86

      - name: Run QEMU smoke test
        run: scripts/qemu-smoke.sh --timeout 12

      - name: Upload QEMU serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-smoke-log
          path: target/qemu-smoke.log

  cmake-metadata-check:
    name: CMake metadata check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure Ninja preset
        run: cmake --preset ninja-i386

  release-package:
    name: Validate release package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib nasm binutils xorriso mtools

      - name: Build release package
        run: bash scripts/package-release.sh --version ci

      - name: Verify release checksum
        run: |
          cd target/release
          sha256sum -c openos-ci.tar.gz.sha256

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: openos-release-ci
          path: |
            target/release/openos-ci.tar.gz
            target/release/openos-ci.tar.gz.sha256
